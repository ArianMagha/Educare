<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Plataforma de Cursos</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:"Poppins",sans-serif;}
body{background:linear-gradient(135deg,#1b5e20,#2e7d32);min-height:100vh;display:flex;justify-content:center;align-items:center;}
.container{width:420px;background:white;padding:40px;border-radius:12px;box-shadow:0 10px 30px rgba(0,0,0,0.25);}
h2{text-align:center;margin-bottom:20px;color:#1b5e20;}
input{width:100%;padding:12px;margin:8px 0;border-radius:6px;border:1px solid #ddd;}
button{width:100%;padding:12px;margin-top:12px;border:none;border-radius:6px;background:#2e7d32;color:white;cursor:pointer;}
#areaCursos{width:900px;background:white;padding:40px;border-radius:12px;}
#modulos,#aulas{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:15px;margin-top:20px;}
.moduloCard,.aulaCard{background:#f4f4f4;padding:20px;border-radius:10px;text-align:center;cursor:pointer;}
#aula{width:900px;background:white;padding:40px;border-radius:12px;}
iframe{width:100%;height:450px;}
</style>
</head>

<body>

<div id="login" class="container">
<h2>Login</h2>
<input id="email" placeholder="Email">
<input id="senha" type="password" placeholder="Senha">
<button onclick="fazerLogin()">Entrar</button>
</div>

<div id="areaCursos" style="display:none;">
<h2 id="boasVindas"></h2>
<div id="modulos"></div>
<button onclick="voltarLogin()">Sair</button>
</div>

<div id="listaAulas" style="display:none;" class="container">
<h2 id="tituloModulo"></h2>
<div id="aulas"></div>
<button onclick="voltarModulos()">Voltar</button>
</div>

<div id="aula" style="display:none;">
<p id="descricaoAula"></p>
<iframe id="videoAula"></iframe>
<button onclick="voltarAulas()">Voltar</button>
</div>

<script>

// LOGIN
async function fazerLogin(){

let email = document.getElementById("email").value;
let senha = document.getElementById("senha").value;

let res = await fetch("db.json");
let data = await res.json();

let user = data.usuarios.find(u => u.email == email && u.senha == senha);

if(user){
document.getElementById("login").style.display="none";
document.getElementById("areaCursos").style.display="block";
document.getElementById("boasVindas").innerText="Bem vindo, "+user.nome;
carregarModulos();
}else{
alert("Login inválido");
}

}

// MODULOS
async function carregarModulos(){

let res = await fetch("db.json");
let data = await res.json();

let modulos = {};
let div = document.getElementById("modulos");
div.innerHTML="";

data.cursos.forEach(c=>{
modulos[c.modulo]=true;
});

Object.keys(modulos).forEach(m=>{
let card=document.createElement("div");
card.className="moduloCard";
card.innerText=m;
card.onclick=function(){abrirModulo(m);}
div.appendChild(card);
});

}

// AULAS
async function abrirModulo(modulo){

let res = await fetch("db.json");
let data = await res.json();

let lista = data.cursos.filter(c=>c.modulo==modulo);

document.getElementById("areaCursos").style.display="none";
document.getElementById("listaAulas").style.display="block";
document.getElementById("tituloModulo").innerText=modulo;

let div=document.getElementById("aulas");
div.innerHTML="";

lista.forEach(a=>{
let card=document.createElement("div");
card.className="aulaCard";
card.innerText=a.aula;
card.onclick=function(){abrirAula(a);}
div.appendChild(card);
});

}

// AULA
function abrirAula(aula){
document.getElementById("listaAulas").style.display="none";
document.getElementById("aula").style.display="block";
document.getElementById("descricaoAula").innerText=aula.descricao;
document.getElementById("videoAula").src=aula.link;
}

// VOLTAR
function voltarLogin(){
document.getElementById("areaCursos").style.display="none";
document.getElementById("login").style.display="block";
}

function voltarModulos(){
document.getElementById("listaAulas").style.display="none";
document.getElementById("areaCursos").style.display="block";
}

function voltarAulas(){
document.getElementById("aula").style.display="none";
document.getElementById("listaAulas").style.display="block";
}

</script>

</body>
</html>
